name: flutter_tv_media3
description: "Android TV Media3 player plugin. Supports AFR, HDR, and custom UI in a separate Activity."

version: 0.2.0
homepage: https://github.com/Farg0k/flutter_tv_media3
repository: https://github.com/Farg0k/flutter_tv_media3
issue_tracker: https://github.com/Farg0k/flutter_tv_media3/issues

environment:
  sdk: ^3.7.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  bloc_event_transformers: ^2.0.0
  intl: ^0.20.2
  collection: ^1.19.1
  sprintf: ^7.0.0
  visibility_detector: ^0.4.0+2
  lottie: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: pro.appexp.flutter_tv_media3
        pluginClass: FlutterTvMedia3Plugin
      windows:
        pluginClass: FlutterTvMedia3PluginCApi